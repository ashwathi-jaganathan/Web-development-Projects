<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Highlighter</title>
    <link rel="stylesheet" href="INDEX.CSS">
</head>
<body>
    <h2>Image Preview System</h2>
    <div class="container">
        <div class="preview-box">
            <img src="ASSETS/IMG 1.jpg" alt="preview" class="preview" id="pre">
        </div>
        <div class="gallery-box">
            <h2>Gallery</h2>
            <div class="gallery">
                <img src="ASSETS/IMG 1.jpg" alt="image 1" >
                <img src="ASSETS/IMG 2.jpg" alt="image 2">
                <img src="ASSETS/IMG 3.jpg" alt="image 3">
                <img src="ASSETS/IMG 4.jpg" alt="image 4">
                <img src="ASSETS/IMG 5.jpg" alt="image 5">
                <img src="ASSETS/IMG 6.jpg" alt="image 6">
            </div>
        </div>
    </div>
    <script src="INDEX.JS"></script>
</body>
</html>
